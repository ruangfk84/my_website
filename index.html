<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan QR NISN</title>

<!-- library QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body{
    font-family: Arial;
    text-align:center;
    background:#f2f4f7;
  }

  .frame{
    width:320px;
    margin:20px auto;
    border:4px solid #2196f3;
    border-radius:12px;
    padding:10px;
    background:white;
  }

  button{
    padding:10px 18px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
  }
</style>
</head>
<body>

<h2>Scan QR NISN</h2>

<div class="frame">
  <div id="reader" style="width:300px;"></div>
</div>

<button onclick="startScan()">Buka Kamera</button>
<button onclick="stopScan()">Tutup Kamera</button>

<p id="hasil">Hasil: -</p>

<script>
let html5QrCode;
let data = null; // ← variabel NISN siswa

// =======================
// START SCAN
// =======================
function startScan() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {
      // ✅ QR terbaca
      data = decodedText; // ← NISN masuk ke variabel
      document.getElementById("hasil").innerText =
        "Hasil: " + data;

      console.log("NISN:", data);

      // optional: stop setelah scan
      stopScan();

      // 👉 nanti bisa kirim ke Apps Script
      // kirimNISN(data);
    },
    (error) => {
      // abaikan error scan
    }
  ).catch(err => {
    alert("Tidak bisa membuka kamera: " + err);
  });
}

// =======================
// STOP SCAN
// =======================
function stopScan() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
    }).catch(() => {});
  }
}
</script>

</body>
</html>
